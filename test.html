<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Up Fade-In Header</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 font-sans">

    <header id="main-header"
        class="fixed top-0 left-0 w-full z-50 bg-white border-b border-gray-200 px-6 py-4 transition-all duration-500 ease-in-out shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-600 uppercase tracking-widest">Ateky Design</h1>
            <nav class="flex space-x-6 text-gray-600 font-medium">
                <a href="#" class="hover:text-indigo-600">Work</a>
                <a href="#" class="hover:text-indigo-600">About</a>
                <a href="#" class="hover:text-indigo-600">Contact</a>
            </nav>
        </div>
    </header>

    <main class="pt-32 pb-20 px-6">
        <div class="max-w-3xl mx-auto space-y-12" id="content-container">
            <div class="text-center pb-10">
                <h2 class="text-4xl font-extrabold text-gray-900 mb-4">Start Scrolling Down</h2>
                <p class="text-lg text-gray-500 italic">The header will slide up and vanish...</p>
            </div>
        </div>
    </main>

    <footer class="bg-gray-100 py-10 text-center text-gray-400">
        <p>You've reached the bottom. Now scroll up to see the header fade in!</p>
    </footer>

    <script>
        const header = document.getElementById('main-header');
        let lastScrollY = window.scrollY;

        window.addEventListener('scroll', () => {
            const currentScrollY = window.scrollY;

            // 1. If we are at the very top, keep the header visible
            if (currentScrollY <= 0) {
                header.classList.remove('-translate-y-full', 'opacity-0');
                return;
            }

            // 2. Determine scroll direction
            if (currentScrollY > lastScrollY) {
                // SCROLLING DOWN: Hide header
                header.classList.add('-translate-y-full', 'opacity-0');
            } else {
                // SCROLLING UP: Show/Fade in header
                header.classList.remove('-translate-y-full', 'opacity-0');
            }

            // Update last scroll position
            lastScrollY = currentScrollY;
        });

        // Helper to generate long body content
        const container = document.getElementById('content-container');
        for (let i = 1; i <= 10; i++) {
            const card = document.createElement('div');
            card.className = "bg-white p-8 rounded-2xl shadow-sm border border-gray-100 h-80 flex flex-col justify-center items-center text-center";
            card.innerHTML = `<span class="text-6xl mb-4">📄</span> <h3 class="text-2xl font-bold">Content Section ${i}</h3><p class="text-gray-400 mt-2">More filler text to ensure you can scroll far down the page.</p>`;
            container.appendChild(card);
        }
    </script>
</body>

</html>
