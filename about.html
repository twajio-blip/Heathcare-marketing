<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us - Legacy Health Growth</title>
    <meta name="description"
        content="Learn more about Legacy Health Growth, a specialized healthcare marketing agency dedicated to patient acquisition and practice growth.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&amp;family=Quicksand:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./src/css/tailwind.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/png" href="./images/Legacy_Health_Growth-removebg.png">
    <link rel="apple-touch-icon" href="./images/Legacy_Health_Growth-removebg.png">
</head>

<body
    class="relative min-h-screen overflow-x-hidden bg-skin-background font-poppins text-skin-accent antialiased selection:bg-skin-primary selection:text-white">

    <!-- HEADER PLACEHOLDER -->
    <div id="header-container"></div>

    <main class="w-full overflow-hidden pt-16 lg:pt-32">
        <!-- Hero Section -->
        <section class="relative container-custom overflow-hidden">
            <div class="z-10">
                <div class="flex flex-col items-center text-center">
                    <nav class="flex items-center gap-2 mb-6" aria-label="Breadcrumb">
                        <a href="./index.html"
                            class="text-size-accent font-black uppercase tracking-widest text-skin-accent/40 hover:text-skin-primary transition-colors duration-300">Home</a>
                        <span class="text-size-accent text-skin-accent/20"><i
                                class="fa-solid fa-chevron-right text-[10px]"></i></span>
                        <span class="text-size-accent font-black uppercase tracking-widest text-skin-primary">About
                            Us</span>
                    </nav>
                    <h1 class="text-size-title animate-gradient">
                        About Us
                    </h1>
                    <p class="text-size-body text-skin-accent-2 max-w-2xl font-medium leading-relaxed italic">
                        Growth engineers and digital strategists dedicated to scaling healthcare brands through clinical
                        precision.
                    </p>
                    <div class="mt-medium flex justify-center gap-2">
                        <div class="w-14 h-1 rounded-full bg-skin-primary"></div>
                        <div class="w-5 h-1 rounded-full bg-skin-accent/50"></div>
                        <div class="w-5 h-1 rounded-full bg-skin-accent/20"></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="about" class="relative overflow-hidden container-custom">
            <div id="about-content-container" class="flex flex-col gap-large lg:gap-huge">
                <!-- Dynamic Content Injected by about.js -->
            </div>
        </section>
        <!-- States Section -->
        <section id="impact-stats" class="relative overflow-hidden">
            <!-- High-Impact Background Image with Dark Overlay -->
            <div class="absolute inset-0 z-0">
                <img src="./images/what-our-clint-say.jpg" alt="Impact Background" class="w-full h-full object-cover" />
                <div class="absolute inset-0 bg-skin-accent/80 backdrop-blur-[2px]"></div>
            </div>

            <div class="relative z-10 container-custom">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-huge" data-aos="fade-up">
                    <!-- Stat Item 1 -->
                    <div class="text-center group">
                        <div class="mb-medium transform transition-transform duration-500 group-hover:scale-110">
                            <h2 class="text-white font-black text-size-title">
                                <span class="stat-number" data-target="15">0</span>+
                            </h2>
                        </div>
                        <div class="text-size-accent text-skin-primary-2 font-black uppercase">
                            <p>Years Experience</p>
                        </div>
                    </div>

                    <!-- Stat Item 2 -->
                    <div class="text-center group">
                        <div class="mb-medium transform transition-transform duration-500 group-hover:scale-110">
                            <h2 class="text-white font-black text-size-title">
                                <span class="stat-number" data-target="350">0</span>+
                            </h2>
                        </div>
                        <div class="text-size-accent text-skin-primary-2 font-black uppercase">
                            <p>Clients Served</p>
                        </div>
                    </div>

                    <!-- Stat Item 3 -->
                    <div class="text-center group">
                        <div class="mb-medium transform transition-transform duration-500 group-hover:scale-110">
                            <h2 class="text-white font-black text-size-title">
                                $<span class="stat-number" data-target="500">0</span>M
                            </h2>
                        </div>
                        <div class="text-size-accent text-skin-primary-2 font-black uppercase">
                            <p>Revenue Generated</p>
                        </div>
                    </div>

                    <!-- Stat Item 4 -->
                    <div class="text-center group">
                        <div class="mb-medium transform transition-transform duration-500 group-hover:scale-110">
                            <h2 class="text-white font-black text-size-title">
                                <span class="stat-number" data-target="98">0</span>%
                            </h2>
                        </div>
                        <div class="text-size-accent text-skin-primary-2 font-black uppercase">
                            <p>Retention Rate</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- FOOTER PLACEHOLDER -->
    <div id="footer-container"></div>

    <!-- Progress Bar -->
    <div id="progress">
        <span id="progress-value">
            <i class="fa-solid fa-arrow-up text-skin-primary"></i>
        </span>
    </div>

    <script type="module" src="./src/main.js"></script>
    <script type="module" src="./src/js/about.js"></script>
    <script type="module" src="./src/header&footer.js"></script>



</body>

</html>
